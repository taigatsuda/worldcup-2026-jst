name: Build & Deploy to Pages

# 公開サイトを生成して GitHub Pages にデプロイする。
# - push 時
# - 15分ごと（試合結果の自動更新）
# - 手動実行（Actions タブの Run workflow）
on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に絞る（古いデプロイは諦める）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 最新スコアを取得してサイトを生成
        env:
          WC_API_TOKEN: ${{ secrets.WC_API_TOKEN }}
        run: python3 src/build.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
